name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate Keystore
        working-directory: android-twa
        run: |
          keytool -genkeypair -alias iptv-trex -keyalg RSA -keysize 2048 \
            -validity 10000 -keystore keystore.jks \
            -storepass iptvtrex123 -keypass iptvtrex123 \
            -dname "CN=IPTV TREX, OU=App, O=IPTVTREX, L=Berlin, ST=Berlin, C=DE"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Debug APK
        working-directory: android-twa
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Build Release APK
        working-directory: android-twa
        run: ./gradlew assembleRelease

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: iptv-trex-debug
          path: android-twa/app/build/outputs/apk/debug/*.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: iptv-trex-release
          path: android-twa/app/build/outputs/apk/release/*.apk
