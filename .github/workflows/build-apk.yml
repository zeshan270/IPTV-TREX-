name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android Build Tools
        run: sdkmanager "build-tools;34.0.0" "platforms;android-34"

      - name: Generate Keystore
        working-directory: android-twa
        run: |
          keytool -genkeypair -alias iptv-trex -keyalg RSA -keysize 2048 \
            -validity 10000 -keystore keystore.jks \
            -storepass iptvtrex123 -keypass iptvtrex123 \
            -dname "CN=IPTV TREX, OU=App, O=IPTVTREX, L=Berlin, ST=Berlin, C=DE"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Build APK
        working-directory: android-twa
        env:
          KEYSTORE_PASSWORD: iptvtrex123
          KEY_PASSWORD: iptvtrex123
        run: gradle assembleRelease --no-daemon --stacktrace

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: iptv-trex-release
          path: android-twa/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
